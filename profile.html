<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会社概要｜株式会社ｃｉｒｃｌｅ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* ⚠️ここに①トップページと全く同じCSSを貼り付けてください（省略しています） */
        
        /* 会社概要 特有のスタイル */
        .page-header {
            padding: 180px 4% 60px; text-align: center;
        }
        .page-title {
            font-size: 1.8rem; font-weight: 500; color: var(--text-main); letter-spacing: 0.15em;
        }
        .profile-table {
            width: 100%; border-collapse: collapse; margin-top: 40px; font-size: 1rem;
        }
        .profile-table tr { border-bottom: 1px solid rgba(140, 118, 98, 0.2); }
        .profile-table th {
            text-align: left; padding: 25px 15px; color: var(--accent); font-weight: 500; width: 30%; vertical-align: top;
        }
        .profile-table td {
            padding: 25px 15px; color: var(--text-main); line-height: 2;
        }
        .btn-back {
            display: inline-block; margin-top: 60px; font-size: 0.9rem; color: var(--text-sub); text-decoration: none;
            border-bottom: 1px solid var(--text-sub); padding-bottom: 5px; transition: color 0.3s, border-color 0.3s;
        }
        .btn-back:hover { color: var(--accent); border-color: var(--accent); }
    </style>
</head>
<body>

    <div id="header">
        <div class="header-inner">
            <div class="logo"><a href="./index.html">株式会社ｃｉｒｃｌｅ</a></div>
            <div class="nav-pc">
                <ul>
                    <li><a href="./index.html">ホーム</a></li>
                    <li><a href="./profile.html">会社概要</a></li>
                </ul>
            </div>
        </div>
    </div>

    <div class="bg-circle circle1"></div>
    <div class="bg-circle circle2"></div>

    <div class="page-header fade-in">
        <h1 class="page-title">会社概要</h1>
    </div>

    <div class="content-section fade-in" style="padding-top: 0; max-width: 800px;">
        <table class="profile-table">
            <tr><th>会社名</th><td>株式会社ｃｉｒｃｌｅ</td></tr>
            <tr><th>所在地</th><td>長野県塩尻市広丘堅石817-7</td></tr>
            <tr><th>電話番号</th><td>090-3408-1379</td></tr>
            <tr><th>対応工事</th><td>外壁塗装工事、屋根塗装工事</td></tr>
            <tr><th>ご案内</th><td>お問い合わせをお待ちしております。ご不明な点がございましたら、まずはお気軽にご相談下さい。</td></tr>
        </table>

        <div style="text-align: center;">
            <a href="./index.html" class="btn-back">← ホームへ戻る</a>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="./index.html">ホーム</a>
            <a href="./profile.html">会社概要</a>
        </div>
        <div class="copyright">
            Copyright &copy; 株式会社ｃｉｒｃｌｅ All Rights Reserved.<br>
            <span style="font-size: 0.7rem; letter-spacing: 0.15em; opacity: 0.6; display: inline-block; margin-top: 8px;">〜 すべての「えん」を大切に 〜</span>
        </div>
    </footer>

    <script>
        const faders = document.querySelectorAll('.fade-in');
        const appearOptions = { threshold: 0.1, rootMargin: "0px 0px -40px 0px" };
        const appearOnScroll = new IntersectionObserver(function(entries, appearOnScroll) {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                entry.target.classList.add('active');
                appearOnScroll.unobserve(entry.target);
            });
        }, appearOptions);
        faders.forEach(fader => appearOnScroll.observe(fader));
        
        // ページ読み込み時に即フェードインさせる
        window.onload = () => {
            document.querySelectorAll('.fade-in').forEach(el => el.classList.add('active'));
        };
    </script>
</body>
</html>
